; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:advance-hmi]
; platform = espressif32
platform = https://github.com/Jason2866/platform-espressif32.git#Arduino/IDF53
board = ESP32-S3-WROOM-1-N16R8
framework = arduino
monitor_speed = 115200

board_build.arduino.partitions = partitions.csv
board_upload.partitions = partitions.csv

; PSRAM Octal mode at 120 MHz
build_flags =
  -DCONFIG_SPIRAM_SPEED_120M=1

; ─── Library dependencies ─────────────────────────────────────────────────────
; ArduinoJson: JSON parsing for server API responses
; WiFi/HTTPClient/WiFiClientSecure: built into ESP32 Arduino core
lib_deps =
  bblanchon/ArduinoJson@^7.2.1
  WiFiClientSecure
