; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:advance-hmi]
; Jason2866/IDF53 is the only platform that works reliably with this board's
; PSRAM (qio_opi) and LovyanGFX RGB display. pioarduino causes I2C driver_ng
; conflicts that crash the device on boot.
; HTTPS is handled via an HTTP proxy on the server side — the device uses
; plain http:// to a proxy endpoint which forwards to the real HTTPS API.
platform = https://github.com/Jason2866/platform-espressif32.git#Arduino/IDF53
board = ESP32-S3-WROOM-1-N16R8
framework = arduino
monitor_speed = 115200

board_build.arduino.partitions = partitions.csv
board_upload.partitions = partitions.csv

; PSRAM Octal mode at 120 MHz
build_flags =
  -DCONFIG_SPIRAM_SPEED_120M=1

; ─── Library dependencies ─────────────────────────────────────────────────────
; ArduinoJson: JSON parsing for server API responses
; HTTPClient: built into Jason2866 Arduino-ESP32 core
; ESP32-audioI2S: MP3 playback via I2S (official Elecrow-recommended library for this board)
lib_deps =
  bblanchon/ArduinoJson@^7.2.1
  schreibfaul1/ESP32-audioI2S@^2.0.0
